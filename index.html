<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Çipil OS</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .panel { border: 1px solid #0f0; padding: 25px; border-radius: 8px; text-align: center; }
        .btn { width: 160px; margin: 10px; padding: 12px; background: #000; color: #0f0; border: 1px solid #0f0; cursor: pointer; text-transform: uppercase; }
        .btn:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>

    <div class="panel">
        <div id="status">SİSTEM HAZIR</div>
        <!-- Dosya artık aynı klasörde cipil.mp3 olarak kayıtlı -->
        <audio id="audio" src="cipil.mp3"></audio>
        
        <button class="btn" id="playBtn">BAŞLAT</button>
        <button class="btn" id="downloadBtn">İNDİR</button>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const status = document.getElementById('status');

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "DURDUR";
                status.innerText = "ÇALIŞIYOR";
            } else {
                audio.pause();
                playBtn.innerText = "BAŞLAT";
                status.innerText = "DURDURULDU";
            }
        });

        // 30 Saniye döngü
        audio.addEventListener('timeupdate', () => {
            if (audio.currentTime >= 30) {
                audio.currentTime = 0;
                audio.play();
            }
        });

        // Yerel dosyayı tetikle
        downloadBtn.addEventListener('click', () => {
            const a = document.createElement('a');
            a.href = "cipil.mp3";
            a.download = "Cipil_Alarm.mp3";
            document.body.appendChild(a);
            a.click();
            a.remove();
            status.innerText = "İNDİRİLİYOR...";
        });
    </script>
</body>
</html>
